version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: maintainiq_redis
    ports:
      - '6379:6379'
    restart: always

  backend:
    build:
      context: ./backend
    container_name: maintainiq_backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: maintainiq_frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: always
